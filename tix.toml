# tix.toml — generated by `tix init`

[context.callpackage]
paths = ["nix/default.nix", "nix/node/env.nix", "nix/node/package.nix"]
stubs = ["@callpackage"]

# library files (no context needed): nix/node/default.nix, nix/pinned_from_flake.nix

# flake files (no context needed): flake.nix

[stubs.generate]
nixpkgs = { expr = "(builtins.getFlake (toString ./.)).inputs.nixpkgs" }


[project]
exclude = ["result", ".direnv"]
